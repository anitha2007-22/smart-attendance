<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Classes — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="faculty"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="card">
    <div class="card-header">My Weekly Schedule</div>
    <div class="table-responsive-card">
      <table class="table table-hover mb-0">
        <thead><tr><th>Day</th><th>Time</th><th>Subject</th><th>Department</th><th>Semester</th><th>Room</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'classes', title: 'My Classes' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

async function loadSchedule() {
  try {
    const res = await window.Api.get('/timetable/my-schedule');
    const body = document.getElementById('tableBody');
    if (!res.data.length) {
      body.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-chalkboard"></i><p>No classes assigned yet</p></div></td></tr>';
      return;
    }
    body.innerHTML = res.data.map((t) => `
      <tr>
        <td class="text-capitalize">${t.day_of_week}</td>
        <td>${formatTime(t.start_time)} - ${formatTime(t.end_time)}</td>
        <td>${escapeHtml(t.subject_name)} <span class="text-secondary small">(${escapeHtml(t.subject_code)})</span></td>
        <td>${escapeHtml(t.department_name)}</td>
        <td>Sem ${t.semester}</td>
        <td>${escapeHtml(t.room_no || '-')}</td>
      </tr>`).join('');
  } catch (e) { showToast(e.message, 'error'); }
}
loadSchedule();
</script>
</body>
</html>
