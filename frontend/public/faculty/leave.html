<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Requests — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="faculty"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="card">
    <div class="card-header">Pending Leave Requests</div>
    <div class="table-responsive-card">
      <table class="table table-hover mb-0">
        <thead><tr><th>Student</th><th>From</th><th>To</th><th>Reason</th><th class="text-end">Action</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'leave', title: 'Leave Requests' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

async function loadPending() {
  try {
    const res = await window.Api.get('/leave/pending');
    const body = document.getElementById('tableBody');
    if (!res.data.length) {
      body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="fa-solid fa-plane-departure"></i><p>No pending leave requests</p></div></td></tr>';
      return;
    }
    body.innerHTML = res.data.map((r) => `
      <tr>
        <td>${escapeHtml(r.student_name)} <span class="text-secondary small">(${escapeHtml(r.roll_no)})</span></td>
        <td>${formatDate(r.from_date)}</td>
        <td>${formatDate(r.to_date)}</td>
        <td class="small">${escapeHtml(r.reason)}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-light-soft me-1" style="color:var(--success-500);" onclick="review(${r.id}, 'approved')"><i class="fa-solid fa-check me-1"></i>Approve</button>
          <button class="btn btn-sm btn-light-soft" style="color:var(--danger-500);" onclick="review(${r.id}, 'rejected')"><i class="fa-solid fa-xmark me-1"></i>Reject</button>
        </td>
      </tr>`).join('');
  } catch (e) { showToast(e.message, 'error'); }
}

async function review(id, status) {
  const review_comment = prompt(status === 'approved' ? 'Optional note:' : 'Reason for rejection:');
  try {
    await window.Api.patch(`/leave/${id}/review`, { status, review_comment: review_comment || undefined });
    showToast(`Leave request ${status}`);
    loadPending();
  } catch (e) { showToast(e.message, 'error'); }
}
window.review = review;
loadPending();
</script>
</body>
</html>
