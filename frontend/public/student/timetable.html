<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Timetable — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="student"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="row g-3" id="timetableGrid"></div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'timetable', title: 'My Timetable' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

const DAYS = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

async function loadTimetable() {
  try {
    const userRes = await window.Api.get('/auth/me');
    const profile = userRes.data.profile;
    const res = await window.Api.get('/timetable', { department_id: profile.department_id, semester: profile.semester });

    const grid = document.getElementById('timetableGrid');
    const byDay = {};
    DAYS.forEach((d) => (byDay[d] = []));
    res.data.forEach((entry) => { if (byDay[entry.day_of_week]) byDay[entry.day_of_week].push(entry); });

    grid.innerHTML = DAYS.map((day) => `
      <div class="col-lg-4 col-md-6">
        <div class="card h-100">
          <div class="card-header text-capitalize">${day}</div>
          <div class="card-body">
            ${byDay[day].length ? byDay[day].map((e) => `
              <div class="d-flex align-items-center gap-3 mb-3 pb-3" style="border-bottom:1px solid var(--border-color);">
                <div class="text-center" style="min-width:70px;">
                  <div class="fw-bold small">${formatTime(e.start_time)}</div>
                  <div class="text-muted" style="font-size:0.7rem;">${formatTime(e.end_time)}</div>
                </div>
                <div>
                  <div class="fw-semibold small">${escapeHtml(e.subject_name)}</div>
                  <div class="text-secondary" style="font-size:0.76rem;">${escapeHtml(e.faculty_name)} • Room ${escapeHtml(e.room_no || '-')}</div>
                </div>
              </div>
            `).join('') : '<div class="text-secondary small text-center py-3">No classes</div>'}
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) { showToast(e.message, 'error'); }
}

loadTimetable();
</script>
</body>
</html>
