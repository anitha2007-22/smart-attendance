<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Students — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="admin"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="card mb-3">
    <div class="card-body">
      <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center">
        <div class="input-search" style="min-width:240px;flex:1;">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" class="form-control" id="searchInput" placeholder="Search by name, email, or roll no...">
        </div>
        <select class="form-select" id="deptFilter" style="max-width:220px;">
          <option value="">All Departments</option>
        </select>
        <select class="form-select" id="semFilter" style="max-width:160px;">
          <option value="">All Semesters</option>
        </select>
        <button class="btn btn-primary flex-shrink-0" id="addBtn"><i class="fa-solid fa-plus me-1"></i>Add Student</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="table-responsive-card">
      <table class="table table-hover mb-0">
        <thead>
          <tr><th>Student</th><th>Roll No</th><th>Department</th><th>Semester</th><th>Status</th><th class="text-end">Actions</th></tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4">Loading...</td></tr></tbody>
      </table>
    </div>
    <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
      <small class="text-secondary" id="resultsInfo"></small>
      <div id="paginationContainer"></div>
    </div>
  </div>
</template>

<!-- Add/Edit Modal -->
<div class="modal fade" id="studentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Student</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="studentForm">
        <div class="modal-body">
          <input type="hidden" id="studentId">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fName" required>
            </div>
            <div class="col-12">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="fEmail" required>
            </div>
            <div class="col-6">
              <label class="form-label">Roll Number</label>
              <input type="text" class="form-control" id="fRollNo" required>
            </div>
            <div class="col-6">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="fPhone">
            </div>
            <div class="col-6">
              <label class="form-label">Department</label>
              <select class="form-select" id="fDept" required></select>
            </div>
            <div class="col-6">
              <label class="form-label">Semester</label>
              <select class="form-select" id="fSem" required></select>
            </div>
            <div class="col-6">
              <label class="form-label">Batch Year</label>
              <input type="number" class="form-control" id="fBatch" value="2024" required>
            </div>
            <div class="col-6">
              <label class="form-label">Parent Contact</label>
              <input type="text" class="form-control" id="fParentContact">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light-soft" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save Student</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'students', title: 'Manage Students' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

let currentPage = 1;
let departments = [];
const modal = new bootstrap.Modal(document.getElementById('studentModal'));

function populateSemesterOptions() {
  const opts = Array.from({ length: 8 }, (_, i) => `<option value="${i + 1}">Semester ${i + 1}</option>`).join('');
  document.getElementById('semFilter').innerHTML += opts;
  document.getElementById('fSem').innerHTML = opts;
}
populateSemesterOptions();

async function loadDepartments() {
  const res = await window.Api.get('/departments', { limit: 100 });
  departments = res.data;
  const opts = departments.map((d) => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');
  document.getElementById('deptFilter').innerHTML += opts;
  document.getElementById('fDept').innerHTML = opts;
}

async function loadStudents(page = 1) {
  currentPage = page;
  const search = document.getElementById('searchInput').value.trim();
  const department_id = document.getElementById('deptFilter').value;
  const semester = document.getElementById('semFilter').value;

  try {
    const res = await window.Api.get('/admin/students', { page, limit: 10, search, department_id, semester });
    const body = document.getElementById('tableBody');

    if (!res.data.length) {
      body.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-user-graduate"></i><p>No students found</p></div></td></tr>';
    } else {
      body.innerHTML = res.data.map((s) => `
        <tr>
          <td>
            <div class="d-flex align-items-center gap-2">
              <span class="avatar-circle">${initials(s.name)}</span>
              <div>
                <div class="fw-semibold">${escapeHtml(s.name)}</div>
                <div class="small text-secondary">${escapeHtml(s.email)}</div>
              </div>
            </div>
          </td>
          <td>${escapeHtml(s.roll_no)}</td>
          <td>${escapeHtml(s.department_name)}</td>
          <td>Sem ${s.semester}</td>
          <td>${s.is_active ? '<span class="badge-soft success">Active</span>' : '<span class="badge-soft danger">Inactive</span>'}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-light-soft me-1" onclick="editStudent(${s.id})"><i class="fa-solid fa-pen"></i></button>
            <button class="btn btn-sm btn-light-soft text-danger" onclick="deleteStudent(${s.id})"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>`).join('');
    }

    document.getElementById('resultsInfo').textContent = `Showing ${res.data.length} of ${res.meta.totalItems} students`;
    buildPagination(document.getElementById('paginationContainer'), res.meta, loadStudents);
  } catch (e) {
    showToast(e.message, 'error');
  }
}

let studentsCache = {};
async function editStudent(id) {
  try {
    const res = await window.Api.get(`/admin/students/${id}`);
    const s = res.data;
    document.getElementById('modalTitle').textContent = 'Edit Student';
    document.getElementById('studentId').value = s.id;
    document.getElementById('fName').value = s.name;
    document.getElementById('fEmail').value = s.email;
    document.getElementById('fEmail').disabled = true;
    document.getElementById('fRollNo').value = s.roll_no;
    document.getElementById('fPhone').value = s.phone || '';
    document.getElementById('fDept').value = s.department_id;
    document.getElementById('fSem').value = s.semester;
    document.getElementById('fBatch').value = s.batch_year;
    document.getElementById('fParentContact').value = s.parent_contact || '';
    modal.show();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteStudent(id) {
  if (!confirm('Delete this student? This action cannot be undone.')) return;
  try {
    await window.Api.delete(`/admin/students/${id}`);
    showToast('Student deleted successfully');
    loadStudents(currentPage);
  } catch (e) { showToast(e.message, 'error'); }
}

document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('studentForm').reset();
  document.getElementById('modalTitle').textContent = 'Add Student';
  document.getElementById('studentId').value = '';
  document.getElementById('fEmail').disabled = false;
  modal.show();
});

document.getElementById('studentForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('studentId').value;
  const payload = {
    name: document.getElementById('fName').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    roll_no: document.getElementById('fRollNo').value.trim(),
    phone: document.getElementById('fPhone').value.trim() || undefined,
    department_id: parseInt(document.getElementById('fDept').value, 10),
    semester: parseInt(document.getElementById('fSem').value, 10),
    batch_year: parseInt(document.getElementById('fBatch').value, 10),
    parent_contact: document.getElementById('fParentContact').value.trim() || undefined,
  };

  try {
    if (id) {
      delete payload.email;
      await window.Api.put(`/admin/students/${id}`, payload);
      showToast('Student updated successfully');
    } else {
      const res = await window.Api.post('/admin/students', payload);
      showToast(res.data.temp_password ? `Student created. Temp password: ${res.data.temp_password}` : 'Student created successfully');
    }
    modal.hide();
    loadStudents(currentPage);
  } catch (e) { showToast(e.message, 'error'); }
});

document.getElementById('searchInput').addEventListener('input', debounce(() => loadStudents(1)));
document.getElementById('deptFilter').addEventListener('change', () => loadStudents(1));
document.getElementById('semFilter').addEventListener('change', () => loadStudents(1));

window.editStudent = editStudent;
window.deleteStudent = deleteStudent;

(async function init() {
  await loadDepartments();
  await loadStudents(1);
})();
</script>
</body>
</html>
