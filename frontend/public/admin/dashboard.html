<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="admin"></script>

<div id="app-shell-root"></div>

<template id="dashboardTemplate">
  <div class="stats-grid mb-4">
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--brand-100);color:var(--brand-600);"><i class="fa-solid fa-user-graduate"></i></div>
      <div><div class="stat-value" id="statStudents">-</div><div class="stat-label">Total Students</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--success-100);color:var(--success-500);"><i class="fa-solid fa-chalkboard-user"></i></div>
      <div><div class="stat-value" id="statFaculty">-</div><div class="stat-label">Total Faculty</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--info-100);color:var(--info-500);"><i class="fa-solid fa-building"></i></div>
      <div><div class="stat-value" id="statDepartments">-</div><div class="stat-label">Departments</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--warning-100);color:var(--warning-500);"><i class="fa-solid fa-chart-pie"></i></div>
      <div><div class="stat-value" id="statTodayPct">-</div><div class="stat-label">Today's Attendance</div></div>
    </div>
  </div>

  <div class="charts-grid mb-4">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Attendance Trend (Last 14 Days)</span>
      </div>
      <div class="card-body"><canvas id="trendChart" height="90"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header">Department-wise Attendance</div>
      <div class="card-body"><canvas id="deptChart" height="90"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="fa-solid fa-triangle-exclamation text-danger me-2"></i>Low Attendance Students (&lt; 75%)</span>
      <a href="/admin/analytics.html" class="small">View all &rarr;</a>
    </div>
    <div class="table-responsive-card">
      <table class="table table-hover mb-0">
        <thead><tr><th>Roll No</th><th>Name</th><th>Department</th><th>Attendance</th></tr></thead>
        <tbody id="lowAttendanceBody">
          <tr><td colspan="4" class="text-center py-4 text-secondary">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'dashboard', title: 'Admin Dashboard' });
const pageBody = document.getElementById('pageBody');
pageBody.appendChild(document.getElementById('dashboardTemplate').content.cloneNode(true));

async function loadDashboard() {
  try {
    const overview = await window.Api.get('/analytics/overview');
    const d = overview.data;
    document.getElementById('statStudents').textContent = d.totalStudents;
    document.getElementById('statFaculty').textContent = d.totalFaculty;
    document.getElementById('statDepartments').textContent = d.totalDepartments;
    document.getElementById('statTodayPct').textContent = `${d.todayAttendancePercentage}%`;
  } catch (e) { showToast(e.message, 'error'); }

  try {
    const trend = await window.Api.get('/analytics/daily', { days: 14 });
    const labels = trend.data.map((r) => formatDate(r.date));
    const values = trend.data.map((r) => r.percentage);
    new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: { labels, datasets: [{ label: 'Attendance %', data: values, borderColor: '#3b6df6', backgroundColor: 'rgba(59,109,246,0.12)', fill: true, tension: 0.35 }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } },
    });
  } catch (e) { /* chart optional */ }

  try {
    const dept = await window.Api.get('/analytics/department-wise');
    new Chart(document.getElementById('deptChart'), {
      type: 'doughnut',
      data: {
        labels: dept.data.map((r) => r.department_name),
        datasets: [{ data: dept.data.map((r) => r.percentage), backgroundColor: ['#3b6df6', '#16a34a', '#d97706', '#dc2626', '#0891b2'] }],
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } },
    });
  } catch (e) { /* chart optional */ }

  try {
    const low = await window.Api.get('/analytics/low-attendance');
    const body = document.getElementById('lowAttendanceBody');
    if (!low.data.length) {
      body.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-secondary">No students below threshold 🎉</td></tr>';
    } else {
      body.innerHTML = low.data.slice(0, 8).map((s) => `
        <tr>
          <td>${escapeHtml(s.roll_no)}</td>
          <td>${escapeHtml(s.name)}</td>
          <td>${escapeHtml(s.department_name)}</td>
          <td><span class="badge-soft danger">${s.percentage}%</span></td>
        </tr>`).join('');
    }
  } catch (e) { showToast(e.message, 'error'); }
}
loadDashboard();
</script>
</body>
</html>
