<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Faculty — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="admin"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="card mb-3">
    <div class="card-body d-flex flex-wrap gap-2 justify-content-between align-items-center">
      <div class="input-search" style="min-width:240px;flex:1;">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" class="form-control" id="searchInput" placeholder="Search by name, email, or employee code...">
      </div>
      <select class="form-select" id="deptFilter" style="max-width:220px;"><option value="">All Departments</option></select>
      <button class="btn btn-primary flex-shrink-0" id="addBtn"><i class="fa-solid fa-plus me-1"></i>Add Faculty</button>
    </div>
  </div>
  <div class="card">
    <div class="table-responsive-card">
      <table class="table table-hover mb-0">
        <thead><tr><th>Faculty</th><th>Employee Code</th><th>Department</th><th>Designation</th><th>Status</th><th class="text-end">Actions</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4">Loading...</td></tr></tbody>
      </table>
    </div>
    <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
      <small class="text-secondary" id="resultsInfo"></small>
      <div id="paginationContainer"></div>
    </div>
  </div>
</template>

<div class="modal fade" id="facModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Faculty</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="facForm">
        <div class="modal-body">
          <input type="hidden" id="facId">
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Full Name</label><input type="text" class="form-control" id="fName" required></div>
            <div class="col-12"><label class="form-label">Email</label><input type="email" class="form-control" id="fEmail" required></div>
            <div class="col-6"><label class="form-label">Employee Code</label><input type="text" class="form-control" id="fCode" required></div>
            <div class="col-6"><label class="form-label">Phone</label><input type="text" class="form-control" id="fPhone"></div>
            <div class="col-6"><label class="form-label">Department</label><select class="form-select" id="fDept" required></select></div>
            <div class="col-6"><label class="form-label">Designation</label><input type="text" class="form-control" id="fDesig" placeholder="e.g. Assistant Professor"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light-soft" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Faculty</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'faculty', title: 'Manage Faculty' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

let currentPage = 1;
const modal = new bootstrap.Modal(document.getElementById('facModal'));

async function loadDepartments() {
  const res = await window.Api.get('/departments', { limit: 100 });
  const opts = res.data.map((d) => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');
  document.getElementById('deptFilter').innerHTML += opts;
  document.getElementById('fDept').innerHTML = opts;
}

async function loadFaculty(page = 1) {
  currentPage = page;
  const search = document.getElementById('searchInput').value.trim();
  const department_id = document.getElementById('deptFilter').value;
  try {
    const res = await window.Api.get('/admin/faculty', { page, limit: 10, search, department_id });
    const body = document.getElementById('tableBody');
    if (!res.data.length) {
      body.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-chalkboard-user"></i><p>No faculty found</p></div></td></tr>';
    } else {
      body.innerHTML = res.data.map((f) => `
        <tr>
          <td><div class="d-flex align-items-center gap-2">
            <span class="avatar-circle">${initials(f.name)}</span>
            <div><div class="fw-semibold">${escapeHtml(f.name)}</div><div class="small text-secondary">${escapeHtml(f.email)}</div></div>
          </div></td>
          <td>${escapeHtml(f.employee_code)}</td>
          <td>${escapeHtml(f.department_name)}</td>
          <td>${escapeHtml(f.designation || '-')}</td>
          <td>${f.is_active ? '<span class="badge-soft success">Active</span>' : '<span class="badge-soft danger">Inactive</span>'}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-light-soft me-1" onclick="editFaculty(${f.id})"><i class="fa-solid fa-pen"></i></button>
            <button class="btn btn-sm btn-light-soft text-danger" onclick="deleteFaculty(${f.id})"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>`).join('');
    }
    document.getElementById('resultsInfo').textContent = `Showing ${res.data.length} of ${res.meta.totalItems} faculty`;
    buildPagination(document.getElementById('paginationContainer'), res.meta, loadFaculty);
  } catch (e) { showToast(e.message, 'error'); }
}

async function editFaculty(id) {
  try {
    const res = await window.Api.get(`/admin/faculty/${id}`);
    const f = res.data;
    document.getElementById('modalTitle').textContent = 'Edit Faculty';
    document.getElementById('facId').value = f.id;
    document.getElementById('fName').value = f.name;
    document.getElementById('fEmail').value = f.email;
    document.getElementById('fEmail').disabled = true;
    document.getElementById('fCode').value = f.employee_code;
    document.getElementById('fPhone').value = f.phone || '';
    document.getElementById('fDept').value = f.department_id;
    document.getElementById('fDesig').value = f.designation || '';
    modal.show();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteFaculty(id) {
  if (!confirm('Delete this faculty member?')) return;
  try {
    await window.Api.delete(`/admin/faculty/${id}`);
    showToast('Faculty deleted');
    loadFaculty(currentPage);
  } catch (e) { showToast(e.message, 'error'); }
}

document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('facForm').reset();
  document.getElementById('facId').value = '';
  document.getElementById('fEmail').disabled = false;
  document.getElementById('modalTitle').textContent = 'Add Faculty';
  modal.show();
});

document.getElementById('facForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('facId').value;
  const payload = {
    name: document.getElementById('fName').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    employee_code: document.getElementById('fCode').value.trim(),
    phone: document.getElementById('fPhone').value.trim() || undefined,
    department_id: parseInt(document.getElementById('fDept').value, 10),
    designation: document.getElementById('fDesig').value.trim() || undefined,
  };
  try {
    if (id) {
      delete payload.email;
      await window.Api.put(`/admin/faculty/${id}`, payload);
      showToast('Faculty updated');
    } else {
      const res = await window.Api.post('/admin/faculty', payload);
      showToast(res.data.temp_password ? `Faculty created. Temp password: ${res.data.temp_password}` : 'Faculty created');
    }
    modal.hide();
    loadFaculty(currentPage);
  } catch (e) { showToast(e.message, 'error'); }
});

document.getElementById('searchInput').addEventListener('input', debounce(() => loadFaculty(1)));
document.getElementById('deptFilter').addEventListener('change', () => loadFaculty(1));

window.editFaculty = editFaculty;
window.deleteFaculty = deleteFaculty;

(async function init() {
  await loadDepartments();
  await loadFaculty(1);
})();
</script>
</body>
</html>
