<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Departments — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="admin"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-primary" id="addBtn"><i class="fa-solid fa-plus me-1"></i>Add Department</button>
  </div>
  <div class="card">
    <div class="table-responsive-card">
      <table class="table table-hover mb-0">
        <thead><tr><th>Name</th><th>Code</th><th>Students</th><th>Faculty</th><th class="text-end">Actions</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="5" class="text-center py-4">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</template>

<div class="modal fade" id="deptModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Department</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="deptForm">
        <div class="modal-body">
          <input type="hidden" id="deptId">
          <div class="mb-3">
            <label class="form-label">Department Name</label>
            <input type="text" class="form-control" id="fName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Department Code</label>
            <input type="text" class="form-control" id="fCode" required maxlength="20">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light-soft" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'departments', title: 'Manage Departments' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

const modal = new bootstrap.Modal(document.getElementById('deptModal'));

async function loadDepartments() {
  try {
    const res = await window.Api.get('/departments', { limit: 100 });
    const body = document.getElementById('tableBody');
    if (!res.data.length) {
      body.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="fa-solid fa-building"></i><p>No departments yet</p></div></td></tr>';
      return;
    }
    body.innerHTML = res.data.map((d) => `
      <tr>
        <td class="fw-semibold">${escapeHtml(d.name)}</td>
        <td><span class="badge-soft info">${escapeHtml(d.code)}</span></td>
        <td>${d.student_count}</td>
        <td>${d.faculty_count}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-light-soft me-1" onclick='editDept(${JSON.stringify(d)})'><i class="fa-solid fa-pen"></i></button>
          <button class="btn btn-sm btn-light-soft text-danger" onclick="deleteDept(${d.id})"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>`).join('');
  } catch (e) { showToast(e.message, 'error'); }
}

function editDept(d) {
  document.getElementById('modalTitle').textContent = 'Edit Department';
  document.getElementById('deptId').value = d.id;
  document.getElementById('fName').value = d.name;
  document.getElementById('fCode').value = d.code;
  modal.show();
}

async function deleteDept(id) {
  if (!confirm('Delete this department? This may fail if students/faculty/subjects are linked to it.')) return;
  try {
    await window.Api.delete(`/departments/${id}`);
    showToast('Department deleted');
    loadDepartments();
  } catch (e) { showToast(e.message, 'error'); }
}

document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('deptForm').reset();
  document.getElementById('deptId').value = '';
  document.getElementById('modalTitle').textContent = 'Add Department';
  modal.show();
});

document.getElementById('deptForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('deptId').value;
  const payload = { name: document.getElementById('fName').value.trim(), code: document.getElementById('fCode').value.trim().toUpperCase() };
  try {
    if (id) {
      await window.Api.put(`/departments/${id}`, payload);
      showToast('Department updated');
    } else {
      await window.Api.post('/departments', payload);
      showToast('Department created');
    }
    modal.hide();
    loadDepartments();
  } catch (e) { showToast(e.message, 'error'); }
});

window.editDept = editDept;
window.deleteDept = deleteDept;
loadDepartments();
</script>
</body>
</html>
