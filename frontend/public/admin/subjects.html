<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Subjects — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="admin"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-primary" id="addBtn"><i class="fa-solid fa-plus me-1"></i>Add Subject</button>
  </div>
  <div class="card">
    <div class="table-responsive-card">
      <table class="table table-hover mb-0">
        <thead><tr><th>Name</th><th>Code</th><th>Department</th><th>Semester</th><th>Credits</th><th class="text-end">Actions</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" class="text-center py-4">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</template>

<div class="modal fade" id="subjModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Subject</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="subjForm">
        <div class="modal-body">
          <input type="hidden" id="subjId">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Subject Name</label>
              <input type="text" class="form-control" id="fName" required>
            </div>
            <div class="col-6">
              <label class="form-label">Subject Code</label>
              <input type="text" class="form-control" id="fCode" required>
            </div>
            <div class="col-6">
              <label class="form-label">Credits</label>
              <input type="number" class="form-control" id="fCredits" value="4" min="1" max="10" required>
            </div>
            <div class="col-6">
              <label class="form-label">Department</label>
              <select class="form-select" id="fDept" required></select>
            </div>
            <div class="col-6">
              <label class="form-label">Semester</label>
              <select class="form-select" id="fSem" required></select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light-soft" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'subjects', title: 'Manage Subjects' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

const modal = new bootstrap.Modal(document.getElementById('subjModal'));

function populateSemesterOptions() {
  const opts = Array.from({ length: 8 }, (_, i) => `<option value="${i + 1}">Semester ${i + 1}</option>`).join('');
  document.getElementById('fSem').innerHTML = opts;
}
populateSemesterOptions();

async function loadDepartmentOptions() {
  const res = await window.Api.get('/departments', { limit: 100 });
  document.getElementById('fDept').innerHTML = res.data.map((d) => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');
}

async function loadSubjects() {
  try {
    const res = await window.Api.get('/subjects', { limit: 100 });
    const body = document.getElementById('tableBody');
    if (!res.data.length) {
      body.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-book"></i><p>No subjects yet</p></div></td></tr>';
      return;
    }
    body.innerHTML = res.data.map((s) => `
      <tr>
        <td class="fw-semibold">${escapeHtml(s.name)}</td>
        <td><span class="badge-soft info">${escapeHtml(s.code)}</span></td>
        <td>${escapeHtml(s.department_name)}</td>
        <td>Sem ${s.semester}</td>
        <td>${s.credits}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-light-soft me-1" onclick='editSubj(${JSON.stringify(s)})'><i class="fa-solid fa-pen"></i></button>
          <button class="btn btn-sm btn-light-soft text-danger" onclick="deleteSubj(${s.id})"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>`).join('');
  } catch (e) { showToast(e.message, 'error'); }
}

function editSubj(s) {
  document.getElementById('modalTitle').textContent = 'Edit Subject';
  document.getElementById('subjId').value = s.id;
  document.getElementById('fName').value = s.name;
  document.getElementById('fCode').value = s.code;
  document.getElementById('fCredits').value = s.credits;
  document.getElementById('fDept').value = s.department_id;
  document.getElementById('fSem').value = s.semester;
  modal.show();
}

async function deleteSubj(id) {
  if (!confirm('Delete this subject?')) return;
  try {
    await window.Api.delete(`/subjects/${id}`);
    showToast('Subject deleted');
    loadSubjects();
  } catch (e) { showToast(e.message, 'error'); }
}

document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('subjForm').reset();
  document.getElementById('subjId').value = '';
  document.getElementById('modalTitle').textContent = 'Add Subject';
  modal.show();
});

document.getElementById('subjForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('subjId').value;
  const payload = {
    name: document.getElementById('fName').value.trim(),
    code: document.getElementById('fCode').value.trim().toUpperCase(),
    credits: parseInt(document.getElementById('fCredits').value, 10),
    department_id: parseInt(document.getElementById('fDept').value, 10),
    semester: parseInt(document.getElementById('fSem').value, 10),
  };
  try {
    if (id) {
      await window.Api.put(`/subjects/${id}`, payload);
      showToast('Subject updated');
    } else {
      await window.Api.post('/subjects', payload);
      showToast('Subject created');
    }
    modal.hide();
    loadSubjects();
  } catch (e) { showToast(e.message, 'error'); }
});

window.editSubj = editSubj;
window.deleteSubj = deleteSubj;

(async function init() {
  await loadDepartmentOptions();
  await loadSubjects();
})();
</script>
</body>
</html>
