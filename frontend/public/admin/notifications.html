<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — SAMS</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="/src/css/theme.css" rel="stylesheet">
<link href="/src/css/responsive.css" rel="stylesheet">
</head>
<body>
<script src="/src/js/utils/theme.js"></script>
<script src="/src/js/api/client.js"></script>
<script src="/src/js/auth/guard.js" data-roles="admin"></script>

<div id="app-shell-root"></div>

<template id="pageTemplate">
  <div class="row g-3">
    <div class="col-lg-5">
      <div class="card">
        <div class="card-header">Broadcast Notification</div>
        <div class="card-body">
          <form id="broadcastForm">
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" class="form-control" id="fTitle" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" id="fMessage" rows="3" required></textarea>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label">Target Role</label>
                <select class="form-select" id="fRole">
                  <option value="">Everyone</option>
                  <option value="student">Students</option>
                  <option value="faculty">Faculty</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Department (optional)</label>
                <select class="form-select" id="fDept"><option value="">All</option></select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-paper-plane me-2"></i>Send Broadcast</button>
          </form>
        </div>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>My Notifications</span>
          <a href="#" class="small" onclick="markAllRead(); return false;">Mark all read</a>
        </div>
        <div id="notifList" style="max-height:480px;overflow-y:auto;"></div>
      </div>
    </div>
  </div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/src/js/utils/helpers.js"></script>
<script src="/src/js/components/layout.js"></script>
<script>
renderLayout({ activePage: 'notifications', title: 'Notifications' });
document.getElementById('pageBody').appendChild(document.getElementById('pageTemplate').content.cloneNode(true));

async function loadDepartments() {
  try {
    const res = await window.Api.get('/departments', { limit: 100 });
    document.getElementById('fDept').innerHTML += res.data.map((d) => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');
  } catch (e) { /* optional */ }
}

async function loadNotifications() {
  try {
    const res = await window.Api.get('/notifications', { limit: 30 });
    const list = document.getElementById('notifList');
    if (!res.data.length) {
      list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-bell"></i><p>No notifications</p></div>';
      return;
    }
    list.innerHTML = res.data.map((n) => `
      <div class="px-3 py-3 border-bottom" style="border-color:var(--border-color) !important;${n.is_read ? '' : 'background:var(--bg-surface-2);'}">
        <div class="fw-semibold small">${escapeHtml(n.title)}</div>
        <div class="text-secondary small">${escapeHtml(n.message)}</div>
        <div class="text-muted" style="font-size:0.72rem;">${formatDateTime(n.created_at)}</div>
      </div>`).join('');
  } catch (e) { showToast(e.message, 'error'); }
}

async function markAllRead() {
  try {
    await window.Api.patch('/notifications/read-all');
    showToast('All notifications marked as read');
    loadNotifications();
  } catch (e) { showToast(e.message, 'error'); }
}
window.markAllRead = markAllRead;

document.getElementById('broadcastForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    title: document.getElementById('fTitle').value.trim(),
    message: document.getElementById('fMessage').value.trim(),
    role: document.getElementById('fRole').value || undefined,
    department_id: document.getElementById('fDept').value || undefined,
  };
  try {
    const res = await window.Api.post('/notifications/broadcast', payload);
    showToast(`Notification sent to ${res.data.length} user(s)`);
    document.getElementById('broadcastForm').reset();
  } catch (e) { showToast(e.message, 'error'); }
});

loadDepartments();
loadNotifications();
</script>
</body>
</html>
